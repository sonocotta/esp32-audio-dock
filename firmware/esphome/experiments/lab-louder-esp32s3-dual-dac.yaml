# ============================================================
# Louder-ESP32-S3 - Media Player Configuration
# ============================================================
# ESP32 audio board with 2x TAS5825M DAC (I2C+I2S) with built-in DSP
# ============================================================

substitutions:
  name: esphome-web-e349e4
  friendly_name: Louder-ESP32-S3
  task_stack_in_psram: "true" 

  # ===== Board-Specific Pinouts =====
  # I2S audio pins
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14
  i2s_dout_pin: GPIO16

  # TAS5805M MAIN DAC
  tas58xx_variant: TAS5805M
  tas58xx_enable_pin: GPIO17
  i2c_sda_pin: GPIO8
  i2c_scl_pin: GPIO9

  # TAS5805M SECONDARY DAC
  tas58xx_enable_pin_secondary: GPIO18

  # ===== DAC Overrides (optional) =====
  # tas58xx_dac_mode: PBTL 
  # tas58xx_mixer_mode: MONO
  # tas58xx_analog_gain: 0db
  # tas58xx_volume_max: 0dB
  # tas58xx_volume_min: -60dB
  
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.1.4
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

logger:
  level: DEBUG

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esp32-audio-dock
    ref: main
    files:
      - firmware/esphome/packages/audio.yaml
      - firmware/esphome/packages/audio-addon-external-dac.yaml

      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml

  # Debug/local development fallback:
  media_player: !include packages/media-player-no-light.yaml
  media_player_addon_tas58xx: !include packages/media-player-addon-tas58xx-dual.yaml
  media_player_addon_dac_enable: !include packages/media-player-addon-dac-enable-dual.yaml
  
external_components:
  - source: github://mrtoy-me/esphome-tas58xx@dev
    components: [tas58xx]
    refresh: 12h

i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  frequency: 400kHz
  scan: true

audio_dac:
  - platform: tas58xx
    address: 0x2D
    id: external_dac

    tas58xx_dac: ${tas58xx_variant}     
    enable_pin: ${tas58xx_enable_pin}   
    dac_mode: BTL                       
    mixer_mode: STEREO                  
    analog_gain: -9db                   
    volume_max: 0db                     
    volume_min: -60db                   
    update_interval: 5s                 

  - platform: tas58xx
    address: 0x2E
    id: external_dac_secondary

    tas58xx_dac: ${tas58xx_variant}     
    enable_pin: ${tas58xx_enable_pin_secondary}   
    dac_mode: PBTL                      
    mixer_mode: MONO                    
    analog_gain: 0db                    
    volume_max: 0db                     
    volume_min: -60db                   
    update_interval: 5s                

switch:
  - platform: tas58xx
    tas58xx_id: external_dac
    enable_dac:
      name: Enable Main
      id: sw_external_dac_main
      restore_mode: ALWAYS_ON

  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    enable_dac:
      name: Enable Sub
      id: sw_external_dac_secondary
      restore_mode: ALWAYS_ON
      
select:
  - platform: tas58xx
    tas58xx_id: external_dac
    mixer_mode:
      name: _Mixer Mode Main
      id: sel_external_dac_main
    eq_mode:
      name: EQ Mode Main
      id: sel_eq_mode_main

  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    mixer_mode:
      name: _Mixer Mode Sub
      id: sel_external_dac_secondary
    eq_mode:
      name: EQ Mode Sub
      id: sel_eq_mode_secondary
    eq_preset_left_channel:
      id: _eq_preset_left_channel_secondary
      name: EQ Preset Cutoff Sub

number:
  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    channel_volume_left:
      name: _Volume Sub

  - platform: tas58xx
    tas58xx_id: external_dac
    channel_volume_left:
      name: _Volume Left
    channel_volume_right:
      name: _Volume Right

    # new names for left and right eq gains
    left_eq_gain_20Hz:
      name: Left ---20Hz
    left_eq_gain_31.5Hz:
      name: Left ---31.5Hz
    left_eq_gain_50Hz:
      name: Left ---50Hz
    left_eq_gain_80Hz:
      name: Left ---80Hz
    left_eq_gain_125Hz:
      name: Left --125Hz
    left_eq_gain_200Hz:
      name: Left --200Hz
    left_eq_gain_315Hz:
      name: Left --315Hz
    left_eq_gain_500Hz:
      name: Left --500Hz
    left_eq_gain_800Hz:
      name: Left --800Hz
    left_eq_gain_1250Hz:
      name: Left -1250Hz
    left_eq_gain_2000Hz:
      name: Left -2000Hz
    left_eq_gain_3150Hz:
      name: Left -3150Hz
    left_eq_gain_5000Hz:
      name: Left -5000Hz
    left_eq_gain_8000Hz:
      name: Left -8000Hz
    left_eq_gain_16000Hz:
      name: Left 16000Hz

### Faults clear registers read from TAS58XX
# sensor:
#   - platform: tas58xx
#     faults_cleared:
#       name: "Times Faults Cleared"

### Faults registers read directly from TAS58XX
binary_sensor:
  - platform: tas58xx
    tas58xx_id: external_dac
    have_fault:
      name: Any Faults (main)
      exclude: CLOCK_FAULT
    left_channel_dc_fault:
      name: Left Channel DC Fault (main)
    right_channel_dc_fault:
      name: Right Channel DC Fault (main)
    left_channel_over_current:
      name: Left Channel Over Current (main)
    right_channel_over_current:
      name: Right Channel Over Current (main)
    otp_crc_check:
      name: CRC Check Fault (main)
    bq_write_failed:
      name: BQ Write Failure (main)
    # I2S clock fault binary sensor is not really useful with speaker media player
    # since it generates clock faults when it manipulates I2S.
    # clock fault:
    #   name: I2S Clock Fault
    pcdd_over_voltage:
      name: PCDD Over Voltage (main)
    pcdd_under_voltage:
      name: PCDD Under Voltage (main)
    over_temp_shutdown:
      name: Over Temperature Shutdown Fault (main)
    over_temp_warning:
      name: Over Temperature Warning (main)
      id: over_temperature_warning

  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    have_fault:
      name: Any Faults (sub)
      exclude: CLOCK_FAULT
    left_channel_dc_fault:
      name: Left Channel DC Fault (sub)
    right_channel_dc_fault:
      name: Right Channel DC Fault (sub)
    left_channel_over_current:
      name: Left Channel Over Current (sub)
    right_channel_over_current:
      name: Right Channel Over Current (sub)
    otp_crc_check:
      name: CRC Check Fault (sub)
    bq_write_failed:
      name: BQ Write Failure (sub)
    # I2S clock fault binary sensor is not really useful with speaker media player
    # since it generates clock faults when it manipulates I2S.
    # clock fault:
    #   name: I2S Clock Fault
    pcdd_over_voltage:
      name: PCDD Over Voltage (sub)
    pcdd_under_voltage:
      name: PCDD Under Voltage (sub)
    over_temp_shutdown:
      name: Over Temperature Shutdown Fault (sub)
    over_temp_warning:
      name: Over Temperature Warning (sub)
      id: over_temperature_warning_sub