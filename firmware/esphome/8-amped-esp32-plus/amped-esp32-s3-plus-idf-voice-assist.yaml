# ============================================================
# Amped-ESP32-S3-Plus - Voice Assistant Configuration
# ============================================================
# Full-featured voice assistant with wake word detection
# Features: Microphone input (I2S), speaker output (PCM5122),
#           wake word detection, Home Assistant integration,
#           announcements with ducking, RGB LED, IR receiver
# Requires: Home Assistant with voice assistant setup
# Board-specific pinouts are defined in substitutions section
# ============================================================

substitutions:
  name: esphome-web-2cc030
  friendly_name: Amped-ESP32-S3-Plus-VA
  task_stack_in_psram: "true"

  # Board-specific pinout configuration
  # I2C pins
  i2c_sda_pin: GPIO18
  i2c_scl_pin: GPIO8
  pcm5122_i2c_address: 0x4D
  pcm5122_enable_pin: GPIO4         # optional, to enable/disable the DAC (XSMT physical pin)

  # I2S audio output pins
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14
  i2s_dout_pin: GPIO16
  
  # I2S audio input pins (microphone)
  i2s_mic_lrclk_pin: GPIO40
  i2s_mic_bclk_pin: GPIO41
  i2s_mic_din_pin: GPIO39
  i2s_mic_channel: left # or right?

  # Amplifier control
  amp_enable_pin: GPIO17
  amp_enable_restore_mode: ALWAYS_ON

  # RGB LED
  rgb_led_pin: GPIO21
  
  # IR receiver
  ir_rx_pin: GPIO07
  
  # SPI pins (for display)
  spi_clk_pin: GPIO12
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13
  
  # Display control pins
  display_cs_pin: GPIO47
  display_dc_pin: GPIO38
  display_reset_pin: GPIO48

  # Ethernet pins (if using ethernet instead of wifi)
  eth_cs_pin: GPIO10
  eth_interrupt_pin: GPIO6
  eth_reset_pin: GPIO5
  
  # DAC I2C address
  dac_i2c_address: "0x4D"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.1.4
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

      CONFIG_ESP32_S3_BOX_BOARD: "y"
      # OPTIMIZED WiFi buffers for streaming
      CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM: "16"
      CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM: "32"
      CONFIG_TCPIP_RECVMBOX_SIZE: "512"
      CONFIG_TCP_SND_BUF_DEFAULT: "65535"
      CONFIG_TCP_WND_DEFAULT: "512000"
      CONFIG_TCP_RECVMBOX_SIZE: "512"
      # Audio priority
      CONFIG_FREERTOS_UNICORE: "n"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

logger:
  level: INFO  # Changed from DEBUG to reduce overhead

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esp32-audio-dock
    ref: features/sendspin-config-refactoring
    files:
      - firmware/esphome/packages/dac-pcm5122.yaml
      - firmware/esphome/packages/amp-unmute.yaml
      - firmware/esphome/packages/audio.yaml
      - firmware/esphome/packages/audio-addon-external-dac.yaml
      - firmware/esphome/packages/media-player.yaml
      # - firmware/esphome/packages/media-player-addon-dac-enable.yaml

      - firmware/esphome/packages/light.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml
      # Optional ethernet (replace wifi config if you use this, you need to exclude OLED package if you do this to free up SPI bus)
      # - firmware/esphome/packages/ethernet-w5500.yaml

  esparagus_echo:
    url: https://github.com/sonocotta/esparagus-echo
    ref: main
    files:
      - firmware/esphome/packages/microphone-i2s.yaml
      - firmware/esphome/packages/microphone.yaml
      
      - firmware/esphome/packages/media-player-addon-voice-assist.yaml
      - firmware/esphome/packages/voice-assist.yaml
      # - firmware/esphome/packages/voice-assist-addon-dac-enable.yaml

