# ============================================================
# Loud-ESP32-S3 - Media Player Configuration
# ============================================================
# ESP32 audio board dual MAX98357A DACs (I2S)
# Features: Wi-Fi media player with mixer/resampler,
#           announcements, RGB LED, IR receiver
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================

substitutions:
  name: esphome-web-169858
  friendly_name: Loud-ESP32-S3
  task_stack_in_psram: "true"

  # ===== Board-Specific Pinouts =====
  # I2S audio pins (dual MAX98357A DACs)
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14
  i2s_dout_pin: GPIO16

  # DAC enable pin (actually amp UNMUTE)
  dac_enable_pin: GPIO17
  dac_enable_restore_mode: ALWAYS_OFF

  # RGB LED
  rgb_led_pin: GPIO09

  # IR Receiver
  ir_rx_pin: GPIO07

  # SPI pins (for display)
  spi_clk_pin: GPIO12
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13

  # Display control pins
  display_cs_pin: GPIO39
  display_dc_pin: GPIO40
  display_reset_pin: GPIO38

  # Ethernet pins (if using ethernet instead of wifi)
  eth_cs_pin: GPIO10
  eth_interrupt_pin: GPIO6
  eth_reset_pin: GPIO5

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.1.4
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

logger:
  level: DEBUG

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esp32-audio-dock
    ref: main
    files:
      - firmware/esphome/packages/audio.yaml
      - firmware/esphome/packages/media-player.yaml
      - firmware/esphome/packages/dac-switch.yaml
      - firmware/esphome/packages/media-player-addon-dac-enable.yaml
      - firmware/esphome/packages/light.yaml
      - firmware/esphome/packages/ir-receiver.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml
      - firmware/esphome/packages/oled.yaml
      # Optional ethernet (replace wifi config if you use this)
      # - firmware/esphome/packages/ethernet-w5500.yaml


  # # Debug/local development fallback:
  # audio: !include packages/audio.yaml
  # media_player: !include packages/media-player.yaml
  # dac_switch: !include packages/dac-switch.yaml
  # dac_enable: !include packages/media-player-addon-dac-enable.yaml
  # light: !include packages/light.yaml
  # ir_receiver: !include packages/ir-receiver.yaml
  # monitoring: !include packages/monitoring.yaml
  # monitoring_wifi: !include packages/monitoring-wifi.yaml
  # oled: !include packages/oled.yaml
  # # Optional ethernet (replace wifi config if you use this)
  # # ethernet_w5500: !include packages/ethernet-w5500.yaml