# ============================================================
# Audio I2S Output - Speaker Stack with Mixer & Resampler
# ============================================================
# Configures I2S audio output with mixer and resampler
# Requires substitutions:
#   - i2s_out_lrclk_pin
#   - i2s_out_bclk_pin
#   - i2s_dout_pin
#   - task_stack_in_psram
# Dependencies: dac-tas58xx.yaml (for audio_dac: external_dac)
# ============================================================

i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin: ${i2s_out_lrclk_pin}
    i2s_bclk_pin: ${i2s_out_bclk_pin}

speaker:
  - platform: i2s_audio
    id: speaker_id
    i2s_audio_id: i2s_out
    dac_type: external
    i2s_dout_pin: ${i2s_dout_pin}
    audio_dac: external_dac
    channel: stereo
    sample_rate: 48000
    timeout: never

  - platform: mixer
    id: mixer_speaker_id
    task_stack_in_psram: ${task_stack_in_psram}
    output_speaker: speaker_id
    source_speakers:
      - id: announcement_spk_mixer_input
        timeout: never
      - id: media_spk_mixer_input
        timeout: never

  - platform: resampler
    id: media_spk_resampling_input
    task_stack_in_psram: ${task_stack_in_psram}
    output_speaker: media_spk_mixer_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: announcement_spk_resampling_input
    task_stack_in_psram: ${task_stack_in_psram}
    output_speaker: announcement_spk_mixer_input
    sample_rate: 48000
    bits_per_sample: 16
