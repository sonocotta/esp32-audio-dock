# ============================================================
# Sendspin - DAC mute addon
# ============================================================
# Configures sendspin component to switch on and off DAC on playback events
# Requires substitutions:
#   - task_stack_in_psram
#   - dac_mute_pin
# ============================================================

media_player:
  - id: !extend external_media_player

    on_play:
      - if:
          condition:
            switch.is_on: mute_dac
          then:
            switch.turn_off: mute_dac

    on_idle:
      - if:
          condition:
            switch.is_off: mute_dac
          then:
            switch.turn_on: mute_dac
