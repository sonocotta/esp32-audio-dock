# ============================================================
# IR Receiver - Infrared Remote Control Configuration
# ============================================================
# Configures IR receiver for remote control
# Requires substitutions:
#   - ir_rx_pin
# ============================================================

remote_receiver:
  id: ir_rx
  pin: 
    number: ${ir_rx_pin}
    inverted: true
    mode:
      input: true
  # dump: all

# Infrared platform — creates infrared entities
infrared:
  - platform: ir_rf_proxy
    name: IR Receiver
    # receiver_frequency: 38kHz
    remote_receiver_id: ir_rx