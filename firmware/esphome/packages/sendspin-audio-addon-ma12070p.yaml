# ============================================================
# Sendspin Audio - External DAC addon
# ============================================================
# Extends audio.yaml to attach an external DAC component
# to the existing I2S speaker.
# Dependencies: audio.yaml, dac-*.yaml (id: external_dac)
# ============================================================

speaker:
  - id: !extend i2s_speaker_id
    audio_dac: external_dac
    bits_per_sample: 32bit    # MA12070P requires 32-bit I2S slot width (64 BCLK/frame)

