external_components:
  - source: github://mrtoy-me/esphome-tas58xx@dev
    refresh: 0s

  # - source: github://pr#14933
  #   components: [const, generic_image, media_source, sendspin]
  #   refresh: 1h
  - source:
      type: git
      url: https://github.com/kahrendt/esphome
      ref: 7a6cf5c8472b7e2fa18ee0fc314f66a80d249e32
    components: [const, media_source, sendspin]
    refresh: 1h
  - source:
      type: git
      url: https://github.com/esphome/esphome
      ref: ff8ce89556748509d7ee8724e12d9d43d3c8c1e8
    refresh: 1h
    components: [http_request]



# ESP32 - no resampler

    media_source:
  - platform: sendspin
    id: sendspin_source

  - platform: audio_file
    id: audio_file_source

  - platform: http_request
    id: http_media_source
    buffer_size: 100000

media_player:
  - platform: sendspin
    id: sendspin_group_media_player

  - platform: speaker_source
    id: external_media_player
    name: Media Player
        
    media_pipeline:
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 2
      sample_rate: 48000
      speaker: i2s_audio_speaker
      sources:
        - sendspin_source
        - http_media_source
        - audio_file_source

    volume_increment: 0.05