# ============================================================
# Loud-ESP32-Plus - Media Player Configuration
# ============================================================
# ESP32 audio board with Infineon MA12070P DAC, I2S output, with entry-level DSP
# Configured with Sendspin for synchronized multi-room audio
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================

substitutions:
  name: esphome-web-2cb4b8
  friendly_name: Loud-ESP32-Plus
  task_stack_in_psram: "false"

  # ===== Board-Specific Pinouts =====
  # I2S Audio 
  i2s_lrclk_pin: GPIO25
  i2s_bclk_pin: GPIO26
  i2s_dout_pin: GPIO22
  bits_per_sample: 32bit

  # I2C pins for DAC control
  i2c_sda_pin: GPIO21
  i2c_scl_pin: GPIO27

  # MA12070P DAC
  ma12070p_enable_pin: GPIO13
  ma12070p_mute_pin: GPIO33
  # ma12070p_volume_max: 0dB
  # ma12070p_volume_min: -80dB

  # RGB LED
  rgb_led_pin: GPIO12

  # IR Receiver
  ir_rx_pin: GPIO39

  # SPI pins (for display)
  spi_clk_pin: GPIO18
  spi_mosi_pin: GPIO23
  spi_miso_pin: GPIO19

  # Ethernet (W5500)
  eth_cs_pin: GPIO05
  eth_interrupt_pin: GPIO35
  eth_reset_pin: GPIO14
  
  # Display control pins
  display_cs_pin: GPIO15
  display_dc_pin: GPIO04
  display_reset_pin: GPIO32

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  id: esp32_id
  variant: esp32
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1" 
      sram1_as_iram: true
    sdkconfig_options:
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

logger:
  level: INFO

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esp32-audio-dock
    ref: main
    refresh: 0s
    files:
      - firmware/esphome/packages/dac-ma12070p.yaml
      - firmware/esphome/packages/audio.yaml
      - firmware/esphome/packages/sendspin.yaml
      # Optional: OLED displays clock when idling, and track/artist info when playing
      # - firmware/esphome/packages/sendspin-addon-oled.yaml

      - firmware/esphome/packages/sendspin-audio-addon-ma12070p.yaml
      - firmware/esphome/packages/sendspin-addon-dac-mute.yaml
      - firmware/esphome/packages/sendspin-addon-esp32.yaml
      
      - firmware/esphome/packages/light.yaml
      - firmware/esphome/packages/ir-receiver.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml
      # Optional ethernet (replace wifi config if you use this, you need to exclude OLED package if you do this to free up SPI bus)
      # - firmware/esphome/packages/ethernet-w5500.yaml

  # # Debug/local development fallback:
  # ma12070p_dac: !include packages/dac-ma12070p.yaml
  # sendspin: !include packages/sendspin.yaml
  # sendspin_dac_mute: !include packages/sendspin-addon-dac-mute.yaml
  # audio: !include packages/audio.yaml
  # audio_ma12070p: !include packages/sendspin-audio-addon-ma12070p.yaml
  # oled: !include packages/sendspin-addon-oled.yaml
  # light: !include packages/light.yaml
  # ir_receiver: !include packages/ir-receiver.yaml
  # monitoring: !include packages/monitoring.yaml
  # monitoring_wifi: !include packages/monitoring-wifi.yaml
  # # ethernet: !include packages/ethernet-w5500.yaml